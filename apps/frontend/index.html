<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Operasional Keuangan</title>
    <!-- Tailwind CDN for instant preview without Node.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              emerald: { 600: '#059669', 700: '#047857' },
              navy: { 900: '#0f172a' }
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white p-8 sm:p-10 rounded-xl border border-slate-100 shadow-sm max-w-sm w-full mx-auto">
      <div class="text-center mb-8">
        <div class="w-12 h-12 bg-emerald-600 rounded-lg mx-auto mb-4 flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-900 mb-1">Masuk Sistem</h1>
        <p class="text-sm text-slate-500">Aplikasi Operasional Keuangan</p>
      </div>

      <form id="loginForm">
        <!-- Error Message Placeholder -->
        <div id="errorMsg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg text-center font-medium">
          Username atau password salah!
        </div>

        <div class="mb-5">
          <label class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
          <input id="usernameInput" type="text" placeholder="Masukkan username" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all" required>
        </div>
        
        <div class="mb-6">
          <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
          <input id="passwordInput" type="password" placeholder="••••••••" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all" required>
        </div>

        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-lg shadow-emerald-600/30">
          Masuk Sekarang
        </button>
      </form>
    </div>

    <script src="activity-logger.js"></script>
    <script>
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('usernameInput').value;
        const pass = document.getElementById('passwordInput').value;
        const errorBox = document.getElementById('errorMsg');
        
        if(user === 'budileo' && pass === '12345') {
          errorBox.classList.add('hidden');
          if(typeof ActivityLogger!=='undefined') ActivityLogger.log({action:'LOGIN',entityType:'USER',entityId:user,status:'success',message:'Login berhasil dari browser'});
          window.location.href = 'dashboard.html';
        } else {
          errorBox.classList.remove('hidden');
          if(typeof ActivityLogger!=='undefined') ActivityLogger.log({action:'LOGIN',entityType:'USER',entityId:user||'(kosong)',status:'failed',message:'Login gagal — username/password salah',isCritical:true});
        }
      });
    </script>
    </div>

  </body>
</html>
