<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - TATA GLOBAL</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{emerald:{600:'#059669',700:'#047857'},navy:{900:'#0f172a'}}}}}</script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white p-8 sm:p-10 rounded-2xl border border-slate-100 shadow-lg max-w-sm w-full mx-auto">
      <div class="text-center mb-8">
        <div class="w-14 h-14 bg-emerald-600 rounded-xl mx-auto mb-4 flex items-center justify-center">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h1 class="text-2xl font-black text-slate-900 mb-1">Masuk Sistem</h1>
        <p class="text-sm text-slate-500">Aplikasi Operasional Keuangan</p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div id="errorMsg" class="hidden p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg text-center font-medium"></div>

        <div>
          <label class="block text-xs font-bold text-slate-600 uppercase tracking-widest mb-1.5">Username / Email</label>
          <input id="usernameInput" type="text" placeholder="Masukkan username atau email" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-sm font-semibold" required>
        </div>
        
        <div>
          <label class="block text-xs font-bold text-slate-600 uppercase tracking-widest mb-1.5">Password</label>
          <input id="passwordInput" type="password" placeholder="••••••••" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-sm font-semibold" required>
        </div>

        <button type="submit" id="btnLogin" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-emerald-600/30 text-sm uppercase tracking-wider">
          Masuk Sekarang
        </button>
      </form>
    </div>

    <script src="auth-guard.js"></script>
    <script src="activity-logger.js"></script>
    <script type="module">
      import { supabase } from './supabaseClient.js';

      // Cek Session Supabase, BUKAN HANYA local mock data
      supabase.auth.getSession().then(async ({ data: { session } }) => {
         if (session) {
            const { data: appUser } = await supabase.from('app_users').select('*').eq('email', session.user.email).single();
            
            if (appUser && appUser.status === 'active') {
               AuthGuard.setCurrentUser({
                  id: appUser.id,
                  name: appUser.name,
                  email: appUser.email,
                  role: appUser.role,
                  status: appUser.status,
                  departmentId: appUser.department_id
               });
               window.location.href = 'dashboard.html';
            } else {
               await supabase.auth.signOut();
               localStorage.removeItem('tata_current_user');
            }
         } else {
            localStorage.removeItem('tata_current_user');
         }
      });

      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        let username = document.getElementById('usernameInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        const errorBox = document.getElementById('errorMsg');
        const btn = document.getElementById('btnLogin');

        btn.disabled = true; btn.textContent = 'Memproses...';

        // Mapping legacy username ke email untuk Supabase Auth
        if(username === 'budileo') username = 'budileo@gmail.com';
        else if(!username.includes('@')) username = username + '@gmail.com';

        // 1. Coba login via Supabase
        let { data, error } = await supabase.auth.signInWithPassword({
           email: username,
           password: password
        });

        if (error) {
           const { data: appUser } = await supabase.from('app_users').select('*').eq('email', username).single();
           
           if (!appUser) {
              errorBox.textContent = "Akun belum terdaftar. Silakan hubungi Owner untuk mendapatkan link pendaftaran.";
              errorBox.classList.remove('hidden');
              btn.disabled = false; btn.textContent = 'Masuk Sekarang';
              return;
           }

           if (appUser.status !== 'active') {
              errorBox.textContent = "Akun Anda berstatus Menunggu / Non-aktif. Hubungi Admin.";
              errorBox.classList.remove('hidden');
              btn.disabled = false; btn.textContent = 'Masuk Sekarang';
              return;
           }

           // Jika aktif tapi belum ada di auth.users (karena pendaftaran hanya masuk app_users), auto-signup ke auth
           const { data: signUpData, error: signUpErr } = await supabase.auth.signUp({
              email: username,
              password: password
           });
           
           if (!signUpErr && signUpData && signUpData.session) {
               data = signUpData;
               error = null;
           } else {
               errorBox.textContent = "Login Gagal: Username atau Password salah.";
               errorBox.classList.remove('hidden');
               if (typeof ActivityLogger !== 'undefined') ActivityLogger.log({ action: 'LOGIN', entityType: 'USER', entityId: username, status: 'failed', message: "Salah password", isCritical: true });
               btn.disabled = false; btn.textContent = 'Masuk Sekarang';
               return;
           }
        }

        // 2. Pastikan di app_users memang aktif (untuk kasus login dengan session lama atau salah user)
        let { data: finalAppUser } = await supabase.from('app_users').select('*').eq('email', username).single();
        
        // Auto-migrate owner if missing in app_users (to prevent lockout and keep old auth.uid for RLS)
        if (!finalAppUser && data && data.user && (username === 'budileo@gmail.com' || username === 'budi@tataglobal.com')) {
            await supabase.from('app_users').insert([{
               id: data.user.id,
               name: 'Budi Ariadi',
               email: username,
               username: 'budileo',
               role: 'OWNER',
               status: 'active',
               department_id: 'dept-global-unggas'
            }]);
            const res = await supabase.from('app_users').select('*').eq('email', username).single();
            finalAppUser = res.data;
        }

        if (!finalAppUser || finalAppUser.status !== 'active') {
            await supabase.auth.signOut();
            errorBox.textContent = "Akun Anda berstatus Menunggu / Non-aktif. Hubungi Admin.";
            errorBox.classList.remove('hidden');
            btn.disabled = false; btn.textContent = 'Masuk Sekarang';
            return;
        }

        if (data && data.user) {
           errorBox.classList.add('hidden');
           
           AuthGuard.setCurrentUser({
              id: finalAppUser.id,
              name: finalAppUser.name,
              email: finalAppUser.email,
              role: finalAppUser.role,
              status: finalAppUser.status,
              departmentId: finalAppUser.department_id
           });

           if (typeof ActivityLogger !== 'undefined') ActivityLogger.log({ action: 'LOGIN', entityType: 'USER', entityId: data.user.id, status: 'success', newData: { name: finalAppUser.name, role: finalAppUser.role }, message: 'Login Cloud berhasil: ' + finalAppUser.name });
           window.location.href = 'dashboard.html';
        }
      });
    </script>
  </body>
</html>
