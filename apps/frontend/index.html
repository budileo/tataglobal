<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - TATA GLOBAL</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{emerald:{600:'#059669',700:'#047857'},navy:{900:'#0f172a'}}}}}</script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex items-center justify-center p-4">
    
    <div class="bg-white p-8 sm:p-10 rounded-2xl border border-slate-100 shadow-lg max-w-sm w-full mx-auto">
      <div class="text-center mb-8">
        <div class="w-14 h-14 bg-emerald-600 rounded-xl mx-auto mb-4 flex items-center justify-center">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <h1 class="text-2xl font-black text-slate-900 mb-1">Masuk Sistem</h1>
        <p class="text-sm text-slate-500">Aplikasi Operasional Keuangan</p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div id="errorMsg" class="hidden p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg text-center font-medium"></div>

        <div>
          <label class="block text-xs font-bold text-slate-600 uppercase tracking-widest mb-1.5">Username / Email</label>
          <input id="usernameInput" type="text" placeholder="Masukkan username atau email" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-sm font-semibold" required>
        </div>
        
        <div>
          <label class="block text-xs font-bold text-slate-600 uppercase tracking-widest mb-1.5">Password</label>
          <input id="passwordInput" type="password" placeholder="••••••••" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:bg-white transition-all text-sm font-semibold" required>
        </div>

        <button type="submit" id="btnLogin" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-emerald-600/30 text-sm uppercase tracking-wider">
          Masuk Sekarang
        </button>
      </form>
    </div>

    <script src="auth-guard.js"></script>
    <script src="activity-logger.js"></script>
    <script type="module">
      import { supabase } from './supabaseClient.js';

      // Cek Session Supabase, BUKAN HANYA local mock data
      supabase.auth.getSession().then(({ data: { session } }) => {
         if (session) {
            // Jika ada session cloud, boleh masuk
            if (!AuthGuard.getCurrentUser()) {
               AuthGuard.setCurrentUser({
                  id: session.user.id,
                  name: session.user.email.split('@')[0],
                  email: session.user.email,
                  role: 'OWNER',
                  status: 'active',
                  departmentId: 'dept-global-unggas'
               });
            }
            window.location.href = 'dashboard.html';
         } else {
            // Jika tidak ada session cloud, HAPUS session lokal agar form login muncul
            localStorage.removeItem('tata_current_user');
         }
      });

      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        let username = document.getElementById('usernameInput').value.trim();
        const password = document.getElementById('passwordInput').value;
        const errorBox = document.getElementById('errorMsg');
        const btn = document.getElementById('btnLogin');

        btn.disabled = true; btn.textContent = 'Memproses...';

        // Mapping legacy username ke email untuk Supabase Auth
        if(username === 'budileo') username = 'budileo@gmail.com';
        if(!username.includes('@')) username = username + '@gmail.com';

        // 1. Coba login via Supabase
        let { data, error } = await supabase.auth.signInWithPassword({
           email: username,
           password: password
        });

        if (error) {
           // Langsung coba buatkan otomatis tanpa mengecek pesan error
           const { data: signUpData, error: signUpErr } = await supabase.auth.signUp({
              email: username,
              password: password
           });
           
           if (!signUpErr && signUpData && signUpData.session) {
               // Berhasil auto-signup dan langsung dapat session
               data = signUpData;
               error = null;
           } else if (!signUpErr && (!signUpData || !signUpData.session)) {
               errorBox.textContent = "Auto-Signup tertahan. Harap matikan 'Confirm Email' di menu Providers > Email di Supabase!";
               errorBox.classList.remove('hidden');
               btn.disabled = false; btn.textContent = 'Masuk Sekarang';
               return;
           } else {
               // Jika signup juga error (misal akun sudah ada, berarti password memang salah)
               errorBox.textContent = "Login Gagal: Username atau Password salah.";
               errorBox.classList.remove('hidden');
               if (typeof ActivityLogger !== 'undefined') ActivityLogger.log({ action: 'LOGIN', entityType: 'USER', entityId: username, status: 'failed', message: "Salah password", isCritical: true });
               btn.disabled = false; btn.textContent = 'Masuk Sekarang';
               return;
           }
        }

        // 2. Jika Supabase Login berhasil, sinkronkan ke local AuthGuard
        if (data && data.user) {
           errorBox.classList.add('hidden');
           
           // Simpan local session untuk kompatibilitas dengan halaman lain yg belum migrasi auth
           AuthGuard.setCurrentUser({
              id: data.user.id,
              name: data.user.email.split('@')[0],
              email: data.user.email,
              role: 'OWNER',
              status: 'active',
              departmentId: 'dept-global-unggas'
           });

           if (typeof ActivityLogger !== 'undefined') ActivityLogger.log({ action: 'LOGIN', entityType: 'USER', entityId: data.user.id, status: 'success', newData: { name: username, role: 'OWNER' }, message: 'Login Cloud berhasil: ' + username });
           window.location.href = 'dashboard.html';
        }
      });
    </script>
  </body>
</html>
