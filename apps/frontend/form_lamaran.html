<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulir Lamaran Kerja - TATA GLOBAL</title>
    <meta name="description" content="Kirim lamaran kerja Anda ke TATA GLOBAL" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{emerald:{600:'#059669',700:'#047857'},navy:{900:'#0f172a'}}}}}</script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      body { font-family: 'Inter', sans-serif; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex items-center justify-center py-10 px-4">
    
    <!-- Outer Card Wrapper -->
    <div id="main-card" class="bg-white rounded-3xl border border-slate-200 shadow-xl max-w-2xl w-full overflow-hidden opacity-0 fade-in">
      
      <!-- Brand Header Banner -->
      <div class="bg-gradient-to-r from-emerald-600 to-teal-700 px-8 py-10 text-white relative">
        <div class="absolute top-4 right-6 font-bold text-sm tracking-widest opacity-30">TATA GLOBAL</div>
        <span class="text-xs font-black uppercase tracking-wider bg-emerald-500/30 px-3 py-1 rounded-full border border-emerald-400/20">REKRUITMEN ONLINE</span>
        <h1 id="vacancy-title" class="text-2xl md:text-3xl font-extrabold mt-3 tracking-tight">Memuat Lowongan...</h1>
        <p id="vacancy-position" class="text-emerald-100 font-semibold mt-1">Harap tunggu sebentar...</p>
      </div>

      <!-- Vacancy Info / Description Accordion-style -->
      <div id="vacancy-desc-section" class="bg-slate-50 border-b border-slate-100 px-8 py-5 hidden">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Deskripsi Pekerjaan</h3>
        <p id="vacancy-desc" class="text-sm text-slate-600 leading-relaxed whitespace-pre-wrap"></p>
      </div>

      <!-- Form Section -->
      <form id="form-lamaran" class="p-8 space-y-6">
        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2 border-b border-slate-100 pb-2">
          <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          Data Calon Pelamar
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <!-- Tgl Daftar (Prefilled to Today, Read-only) -->
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1">Tanggal Daftar</label>
            <input type="date" id="tanggal-daftar" class="w-full bg-slate-100 border border-slate-200 text-slate-500 rounded-xl px-4 py-2.5 text-sm cursor-not-allowed" readonly />
          </div>

          <!-- Nama Pelamar -->
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1" for="nama-pelamar">Nama Lengkap</label>
            <input type="text" id="nama-pelamar" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-500 focus:bg-white transition-all" placeholder="Masukkan nama lengkap Anda" required />
          </div>

          <!-- No KTP -->
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1" for="no-ktp">Nomor KTP (NIK)</label>
            <input type="text" id="no-ktp" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-500 focus:bg-white transition-all" placeholder="16 digit nomor KTP" pattern="[0-9]{16}" title="NIK harus berupa 16 digit angka" required />
          </div>

          <!-- No SIM -->
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1" for="no-sim">Nomor SIM (Opsional)</label>
            <input type="text" id="no-sim" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-500 focus:bg-white transition-all" placeholder="Contoh: SIM C / SIM A / None" />
          </div>

          <!-- Nomor Telp -->
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1" for="nomor-telp">Nomor WhatsApp / Telp</label>
            <input type="tel" id="nomor-telp" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-500 focus:bg-white transition-all" placeholder="Contoh: 081234567890" required />
          </div>

          <!-- Nomor Kontak Keluarga -->
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1" for="nomor-kontak-keluarga">Nomor Kontak Keluarga Darurat</label>
            <input type="tel" id="nomor-kontak-keluarga" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-500 focus:bg-white transition-all" placeholder="Contoh: 0812XXXXXXXX (Ibu/Ayah)" required />
          </div>

          <!-- Umur -->
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1" for="umur">Umur (Tahun)</label>
            <input type="number" id="umur" min="15" max="70" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-500 focus:bg-white transition-all" placeholder="Contoh: 25" required />
          </div>

          <!-- Status Nikah -->
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1" for="status-nikah">Status Pernikahan</label>
            <select id="status-nikah" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-500 focus:bg-white transition-all" required>
              <option value="">-- Pilih Status --</option>
              <option value="Belum Menikah">Belum Menikah</option>
              <option value="Menikah">Menikah</option>
              <option value="Duda/Janda">Duda/Janda</option>
            </select>
          </div>

          <!-- Pendidikan -->
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1" for="pendidikan">Pendidikan Terakhir</label>
            <select id="pendidikan" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-500 focus:bg-white transition-all" required>
              <option value="">-- Pilih Pendidikan --</option>
              <option value="SD">SD</option>
              <option value="SMP">SMP</option>
              <option value="SMA/SMK">SMA/SMK</option>
              <option value="D3">D3</option>
              <option value="S1">S1</option>
              <option value="S2">S2</option>
              <option value="S3">S3</option>
            </select>
          </div>

          <!-- Gaji yang Diminta -->
          <div>
            <label class="block text-xs font-bold text-slate-500 mb-1" for="gaji-diminta">Gaji yang Diharapkan (Rp)</label>
            <input type="number" id="gaji-diminta" min="0" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-500 focus:bg-white transition-all" placeholder="Contoh: 3500000" required />
          </div>
        </div>

        <!-- Catatan Lain -->
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1" for="catatan-lain">Catatan Lain (Jika Ada)</label>
          <textarea id="catatan-lain" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-emerald-500 focus:bg-white transition-all h-24 resize-none" placeholder="Tuliskan pengalaman kerja atau informasi tambahan lainnya..."></textarea>
        </div>

        <!-- Submit Button -->
        <div class="pt-4 border-t border-slate-100 flex justify-end">
          <button type="submit" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-emerald-600/20 transition-all duration-300 transform active:scale-95">
            Kirim Lamaran Kerja
          </button>
        </div>
      </form>

      <!-- Loading / Error / Success States (Dynamically Shown) -->
      <div id="state-container" class="hidden p-12 text-center flex flex-col items-center justify-center gap-4">
        <!-- Injected via JavaScript -->
      </div>

    </div>

    <!-- Script loading Supabase and Form Handlers -->
    <script src="toast.js"></script>
    <script type="module">
      import { supabase } from './supabaseClient.js';

      let vacancyId = null;
      let vacancyDetails = null;

      // Extract vacancy ID from Query Parameter
      const urlParams = new URLSearchParams(window.location.search);
      vacancyId = urlParams.get('id');

      // Set tanggal daftar to today
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('tanggal-daftar').value = today;

      // Fetch Vacancy details
      async function fetchVacancy() {
        if (!vacancyId) {
          showErrorState('Tautan tidak valid. ID Lowongan tidak ditemukan.');
          return;
        }

        try {
          const { data, error } = await supabase
            .from('hrd_lowongan')
            .select('*')
            .eq('id', vacancyId)
            .single();

          if (error || !data) {
            showErrorState('Lowongan pekerjaan tidak ditemukan atau sudah ditutup.');
            return;
          }

          vacancyDetails = data;
          
          // Render vacancy details
          document.getElementById('vacancy-title').textContent = data.nama_lowongan;
          document.getElementById('vacancy-position').textContent = data.posisi_lowongan;
          
          if (data.deskripsi) {
            document.getElementById('vacancy-desc').textContent = data.deskripsi;
            document.getElementById('vacancy-desc-section').classList.remove('hidden');
          }
        } catch (e) {
          console.error(e);
          showErrorState('Terjadi kesalahan koneksi data.');
        }
      }

      function showErrorState(message) {
        const form = document.getElementById('form-lamaran');
        const desc = document.getElementById('vacancy-desc-section');
        const cardHeader = document.getElementById('vacancy-title');
        const cardPos = document.getElementById('vacancy-position');
        
        form.classList.add('hidden');
        desc.classList.add('hidden');
        
        cardHeader.textContent = 'Lowongan Tidak Tersedia';
        cardPos.textContent = 'Status: Tidak Aktif';
        
        const stateContainer = document.getElementById('state-container');
        stateContainer.innerHTML = `
          <div class="w-16 h-16 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mb-2">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
          </div>
          <h3 class="text-xl font-bold text-slate-800">Ups, Ada Masalah!</h3>
          <p class="text-sm text-slate-500 max-w-sm">${message}</p>
          <a href="/" class="mt-4 px-6 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-semibold text-xs transition-colors">Kembali ke Beranda</a>
        `;
        stateContainer.classList.remove('hidden');
      }

      // Handle Form Submit
      document.getElementById('form-lamaran').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Extra Validation for NIK (16 Digits)
        const ktp = document.getElementById('no-ktp').value.trim();
        if (ktp.length !== 16 || isNaN(ktp)) {
          showToast('Nomor KTP harus terdiri dari 16 digit angka!', 'warning');
          return;
        }

        const payload = {
          lowongan_id: vacancyId,
          tanggal_daftar: document.getElementById('tanggal-daftar').value,
          nama_pelamar: document.getElementById('nama-pelamar').value.trim(),
          no_ktp: ktp,
          no_sim: document.getElementById('no-sim').value.trim() || null,
          nomor_telp: document.getElementById('nomor-telp').value.trim(),
          nomor_kontak_keluarga: document.getElementById('nomor-kontak-keluarga').value.trim(),
          umur: parseInt(document.getElementById('umur').value),
          status_nikah: document.getElementById('status-nikah').value,
          pendidikan: document.getElementById('pendidikan').value,
          gaji_diminta: parseFloat(document.getElementById('gaji-diminta').value),
          catatan_lain: document.getElementById('catatan-lain').value.trim() || null
        };

        // Disable submit button during load
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Mengirim Lamaran...';

        try {
          const { error } = await supabase
            .from('hrd_pelamar')
            .insert([payload]);

          if (error) throw error;

          // Render Success Screen
          const form = document.getElementById('form-lamaran');
          const desc = document.getElementById('vacancy-desc-section');
          
          form.classList.add('hidden');
          desc.classList.add('hidden');

          const stateContainer = document.getElementById('state-container');
          stateContainer.innerHTML = `
            <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mb-2">
              <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-800">Lamaran Terkirim!</h3>
            <p class="text-sm text-slate-500 max-w-sm">Terima kasih ${escapeHTML(payload.nama_pelamar)}, lamaran Anda untuk posisi <strong>${escapeHTML(vacancyDetails.posisi_lowongan)}</strong> telah berhasil kami terima. Tim HRD kami akan meninjau kualifikasi Anda segera.</p>
            <div class="mt-6 flex flex-col gap-2 w-full max-w-xs">
              <div class="text-[10px] text-slate-400 uppercase tracking-widest font-black mb-1">DATA UTAMA</div>
              <div class="flex justify-between text-xs py-1 border-b border-slate-100"><span class="text-slate-400">NIK (KTP)</span><span class="font-semibold text-slate-700">${payload.no_ktp}</span></div>
              <div class="flex justify-between text-xs py-1 border-b border-slate-100"><span class="text-slate-400">Nomor Telp</span><span class="font-semibold text-slate-700">${payload.nomor_telp}</span></div>
            </div>
          `;
          stateContainer.classList.remove('hidden');
          showToast('Lamaran Anda berhasil dikirim!', 'success');
        } catch (err) {
          console.error(err);
          showToast('Gagal mengirim lamaran: ' + err.message, 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Kirim Lamaran Kerja';
        }
      });

      // Escape HTML to prevent XSS
      function escapeHTML(str) {
        if (!str) return '';
        return str.replace(/[&<>'"]/g, 
          tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
      }

      // Initial Fetch
      document.addEventListener('DOMContentLoaded', fetchVacancy);
    </script>
  </body>
</html>
