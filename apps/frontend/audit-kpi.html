    <script>
      let globalBons = [];
      let globalMasterKonsumen = [];
      
      const formatRp = (num) => 'Rp ' + (num||0).toLocaleString('id-ID');
      const formatKg = (num) => (num||0).toLocaleString('id-ID', {minimumFractionDigits: 1, maximumFractionDigits: 2}) + ' Kg';

      // Safe date parsing YYYY-MM-DD
      function parseYMD(s) {
         if(!s) return new Date();
         const p = s.split('-');
         return new Date(p[0], p[1]-1, p[2]);
      }

      function toLocalYMD(date) {
         const d = new Date(date);
         const month = '' + (d.getMonth() + 1);
         const day = '' + d.getDate();
         const year = d.getFullYear();
         return [year, month.padStart(2, '0'), day.padStart(2, '0')].join('-');
      }

      // RFM scoring helper
      function calculateRFMScore(recencyDays, freq, monetary) {
          let r=1, f=1, m=1;
          if(recencyDays <= 3) r=5;
          else if(recencyDays <= 7) r=4;
          else if(recencyDays <= 14) r=3;
          else if(recencyDays <= 30) r=2;
          else r=1;

          if(freq > 20) f=5;
          else if(freq >= 15) f=4;
          else if(freq >= 10) f=3;
          else if(freq >= 5) f=2;
          else f=1;

          if(monetary > 100000000) m=5;
          else if(monetary >= 50000000) m=4;
          else if(monetary >= 20000000) m=3;
          else if(monetary >= 5000000) m=2;
          else m=1;

          const avg = (r+f+m)/3;
          let segment = 'Low Customer';
          if(avg >= 4) segment = 'Top Customer';
          else if(avg >= 2.5) segment = 'Middle Customer';

          return { r, f, m, avg, segment };
      }

      // Main Calculation Engine
      async function calculateAuditKPI() {
         const bons = globalBons;
         const rangeMode = document.getElementById('filter-range').value;
         const now = new Date();
         now.setHours(0,0,0,0);

         let fromDate, toDate;
         
         // Define Dates
         if (rangeMode === 'bulan-ini') {
            fromDate = toLocalYMD(new Date(now.getFullYear(), now.getMonth(), 1));
            toDate = toLocalYMD(new Date(now.getFullYear(), now.getMonth() + 1, 0));
         } else if (rangeMode === 'bulan-lalu') {
            fromDate = toLocalYMD(new Date(now.getFullYear(), now.getMonth() - 1, 1));
            toDate = toLocalYMD(new Date(now.getFullYear(), now.getMonth(), 0));
         } else {
            fromDate = document.getElementById('start-date').value;
            toDate = document.getElementById('end-date').value;
            if (!fromDate || !toDate) {
               fromDate = toLocalYMD(new Date(now.getFullYear(), now.getMonth(), 1));
               toDate = toLocalYMD(now);
            }
         }

         const fmtHeader = (d) => new Date(d).toLocaleDateString('id-ID', {day:'2-digit', month:'short', year:'numeric', timeZone: 'Asia/Jakarta'});
         const headerPeriodText = `${fmtHeader(fromDate)} s/d ${fmtHeader(toDate)}`;
         
         // FILTER NON-VOID BONS
         const filteredBons = bons.filter(b => !b.isVoid && b.tanggal >= fromDate && b.tanggal <= toDate);
         
         // ============================================
         // 1. OPERASIONAL CALCULATIONS
         // ============================================
         let totalJual = 0;
         let totalEkor = 0;
         let totalKg = 0;
         let jumlahBon = filteredBons.length;
         
         const rekapMap = { KTN: { ekor: 0, kg: 0 }, K: { ekor: 0, kg: 0 }, TB: { ekor: 0, kg: 0 }, B: { ekor: 0, kg: 0 }, JK: { ekor: 0, kg: 0 }, 'K/PK': { ekor: 0, kg: 0 }, JB: { ekor: 0, kg: 0 }, 'B/PK': { ekor: 0, kg: 0 }, 'JB/PK': { ekor: 0, kg: 0 } };
         const auditMap = { KTN: { ekor: 0, kg: 0 }, K: { ekor: 0, kg: 0 }, TB: { ekor: 0, kg: 0 }, B: { ekor: 0, kg: 0 }, JK: { ekor: 0, kg: 0 }, 'K/PK': { ekor: 0, kg: 0 }, JB: { ekor: 0, kg: 0 }, 'B/PK': { ekor: 0, kg: 0 }, 'JB/PK': { ekor: 0, kg: 0 } };
         
         let totalPesanan = 0;
         let totalGeser = 0;
         const datesWithBons = new Set();

         filteredBons.forEach(b => {
            totalJual += Number(b.total);
            datesWithBons.add(b.tanggal);

            (b.items || []).forEach(it => {
               const ekor = Number(it.jmlAyam || 0);
               const kg = Number(it.netto || 0);
               if (ekor > 0) {
                  totalEkor += ekor;
                  totalKg += kg;
                  
                  const rata = kg / ekor;
                  let mapping = '';
                  if (rata < 0.8) mapping = 'KTN';
                  else if (rata < 1.3) mapping = 'K';
                  else if (rata < 1.7) mapping = 'TB';
                  else if (rata < 2.0) mapping = 'B';
                  else if (rata < 2.3) mapping = 'JK';
                  else mapping = 'JB';

                  rekapMap[mapping].ekor += ekor;
                  rekapMap[mapping].kg += kg;

                  const originalUkuran = (it.ukuran || '').toUpperCase();
                  const geser = mapping !== originalUkuran ? 'Geser' : '';
                  
                  if (auditMap[originalUkuran]) {
                     auditMap[originalUkuran].ekor += ekor;
                     auditMap[originalUkuran].kg += kg;
                  }

                  if (geser) totalGeser++;
                  totalPesanan++;
               }
            });
         });

         const activeDaysCount = datesWithBons.size;
         const rataBonPerHari = activeDaysCount > 0 ? (jumlahBon / activeDaysCount).toFixed(1) : 0;
         const matrixGeserPctVal = totalPesanan > 0 ? (totalGeser / totalPesanan * 100).toFixed(0) : 0;

         // Generate Text Table A (Rekapitulasi Matrik Ukuran Ayam)
         let tableAText = "  A. Rekapitulasi Matrik Ukuran Ayam\n";
         tableAText += "     +------------------+---------------+-----------------+\n";
         tableAText += "     | MAPPING UKURAN   |  JUMLAH EKOR  |   JUMLAH BERAT  |\n";
         tableAText += "     +------------------+---------------+-----------------+\n";
         
         const order = ['KTN', 'K', 'TB', 'B', 'JK', 'K/PK', 'JB', 'B/PK', 'JB/PK'];
         let hasDataA = false;
         order.forEach(key => {
            if (rekapMap[key].ekor > 0 || rekapMap[key].kg > 0) {
               hasDataA = true;
               const padKey = key.padEnd(16);
               const padEkor = (rekapMap[key].ekor.toLocaleString('id-ID') + " Ekor").padStart(13);
               const padKg = (rekapMap[key].kg.toLocaleString('id-ID', {minimumFractionDigits: 1, maximumFractionDigits: 1}) + " Kg").padStart(15);
               tableAText += `     | ${padKey} | ${padEkor} | ${padKg} |\n`;
            }
         });
         if (!hasDataA) {
            tableAText += "     |         (Belum ada data transaksi ukuran ayam)         |\n";
         }
         tableAText += "     +------------------+---------------+-----------------+";

         // Generate Text Table B (Data Audit Matrik dengan Realisasi penjualan)
         let tableBText = "  B. Data Audit Matrik dengan Realisasi penjualan\n";
         tableBText += "     +--------+----------------------+---------------+-----------------+\n";
         tableBText += "     | UKURAN | AUDIT / KETERANGAN   |  JUMLAH EKOR  |   JUMLAH BERAT  |\n";
         tableBText += "     +--------+----------------------+---------------+-----------------+\n";
         
         let hasDataB = false;
         order.forEach(key => {
            const ad = auditMap[key];
            const rd = rekapMap[key];
            if (ad.ekor > 0 || rd.ekor > 0) {
               hasDataB = true;
               const diffEkor = ad.ekor - rd.ekor;
               const diffKg = ad.kg - rd.kg;
               const pDiff = ad.ekor > 0 ? (Math.abs(diffEkor) / ad.ekor * 100).toFixed(0) : 0;
               
               const padKey = key.padEnd(6);
               
               // Row 1: Bon Fix
               const padEkor1 = (ad.ekor.toLocaleString('id-ID') + " Ekor").padStart(13);
               const padKg1 = (ad.kg.toLocaleString('id-ID', {minimumFractionDigits: 1, maximumFractionDigits: 1}) + " Kg").padStart(15);
               tableBText += `     | ${padKey} | Ukuran Bon Fix       | ${padEkor1} | ${padKg1} |\n`;
               
               // Row 2: Rekomendasi
               const padEkor2 = (rd.ekor.toLocaleString('id-ID') + " Ekor").padStart(13);
               const padKg2 = (rd.kg.toLocaleString('id-ID', {minimumFractionDigits: 1, maximumFractionDigits: 1}) + " Kg").padStart(15);
               tableBText += `     |        | Ukuran Rekomendasi   | ${padEkor2} | ${padKg2} |\n`;
               
               // Row 3: Geser
               const labelGeser = `Jumlah Geser (${pDiff}%)`.padEnd(20);
               const padEkor3 = (diffEkor.toLocaleString('id-ID') + " Ekor").padStart(13);
               const padKg3 = (diffKg.toLocaleString('id-ID', {minimumFractionDigits: 1, maximumFractionDigits: 1}) + " Kg").padStart(15);
               tableBText += `     |        | ${labelGeser} | ${padEkor3} | ${padKg3} |\n`;
               tableBText += "     +--------+----------------------+---------------+-----------------+\n";
            }
         });
         if (!hasDataB) {
            tableBText += "     |            (Belum ada data audit matriks ayam)                  |\n";
            tableBText += "     +--------+----------------------+---------------+-----------------+\n";
         }
         // Remove trailing newline if it's there
         tableBText = tableBText.trim();

         // ============================================
         // 2. KEUANGAN CALCULATIONS
         // ============================================
         let totalPenerimaan = 0;
         let totalPiutang = 0;
         let totalPotonganKg = 0;
         let totalPotonganRp = 0;

         // Rekap Bon Piutang per Tanggal
         const rekapBonPiutangMap = {};
         const totalBonsPerDateMap = {};

         filteredBons.forEach(b => {
            const tgl = b.tanggal;
            totalBonsPerDateMap[tgl] = (totalBonsPerDateMap[tgl] || 0) + 1;

            const hist = (b.historiBayar || []).filter(h => !h.isVoid);
            let paidForThisBon = 0;
            let potForThisBon = 0;

            hist.forEach(h => {
               const nom = Number(h.nominal || 0);
               const pt = Number(h.totalPotongan || 0);
               
               // Hitung penerimaan hanya jika transaksi pembayaran dilakukan DI DALAM periode terpilih
               if (h.tanggal >= fromDate && h.tanggal <= toDate) {
                  totalPenerimaan += nom;
               }
               paidForThisBon += nom;
               potForThisBon += pt;

               // Akumulasi total potongan (kg & Rp)
               if (h.potongan) {
                  const pot = h.potongan;
                  totalPotonganKg += Number(pot.matiKg || 0) + Number(pot.susutKg || 0) + Number(pot.pulangKg || 0);
                  totalPotonganRp += Number(pot.matiRp || 0) + Number(pot.susutRp || 0) + Number(pot.pulangRp || 0);
               }
            });

            const sisa = Number(b.total) - potForThisBon - paidForThisBon;
            if (sisa > 0.01) {
               totalPiutang += sisa;

               // Kategorikan bon piutang per tanggal
               if (!rekapBonPiutangMap[tgl]) {
                  rekapBonPiutangMap[tgl] = { sebagianLunas: 0, belumBayar: 0, totalPiutang: 0, totalNota: 0 };
               }
               if (paidForThisBon > 0) {
                  rekapBonPiutangMap[tgl].sebagianLunas++;
               } else {
                  rekapBonPiutangMap[tgl].belumBayar++;
               }
               rekapBonPiutangMap[tgl].totalPiutang += sisa;
            }
         });

         // Set totalNota berdasarkan jumlah seluruh faktur/bon non-void
         Object.keys(rekapBonPiutangMap).forEach(tgl => {
            rekapBonPiutangMap[tgl].totalNota = totalBonsPerDateMap[tgl] || 0;
         });

         const terimaPct = totalJual > 0 ? (totalPenerimaan / totalJual * 100).toFixed(0) : 0;
         const piutangPct = totalJual > 0 ? (totalPiutang / totalJual * 100).toFixed(0) : 0;
         const potonganKgPct = totalKg > 0 ? (totalPotonganKg / totalKg * 100).toFixed(1) : '0.0';
         const potonganRpPct = totalJual > 0 ? (totalPotonganRp / totalJual * 100).toFixed(1) : '0.0';

         // Generate Rekap Bon Piutang Table
         const rekapPiutangDates = Object.keys(rekapBonPiutangMap).sort();
         let rekapBonPiutangStr = '';
         if (rekapPiutangDates.length === 0) {
            rekapBonPiutangStr = '     - Tidak ada bon piutang pada periode ini.';
         } else {
            rekapBonPiutangStr += '     +------------+----------+------------+-----------+------------------+\n';
            rekapBonPiutangStr += '     | TANGGAL    | TOTAL    | SEBAGIAN   | BELUM     | TOTAL            |\n';
            rekapBonPiutangStr += '     |            | NOTA     | LUNAS      | DIBAYAR   | PIUTANG          |\n';
            rekapBonPiutangStr += '     +------------+----------+------------+-----------+------------------+\n';
            let grandSebagian = 0, grandBelum = 0, grandPiutang = 0, grandNota = 0;
            rekapPiutangDates.forEach(tgl => {
               const d = rekapBonPiutangMap[tgl];
               const totalNota = d.totalNota;
               grandSebagian += d.sebagianLunas;
               grandBelum += d.belumBayar;
               grandPiutang += d.totalPiutang;
               grandNota += totalNota;
               const fmtTgl = tgl.padEnd(10);
               const fmtNot = String(totalNota).padStart(8);
               const fmtSeb = String(d.sebagianLunas).padStart(10);
               const fmtBel = String(d.belumBayar).padStart(9);
               const fmtPit = formatRp(d.totalPiutang).padStart(16);
               rekapBonPiutangStr += `     | ${fmtTgl} | ${fmtNot} | ${fmtSeb} | ${fmtBel} | ${fmtPit} |\n`;
            });
            rekapBonPiutangStr += '     +------------+----------+------------+-----------+------------------+\n';
            const fmtTotNot = String(grandNota).padStart(8);
            const fmtTotSeb = String(grandSebagian).padStart(10);
            const fmtTotBel = String(grandBelum).padStart(9);
            const fmtTotPit = formatRp(grandPiutang).padStart(16);
            rekapBonPiutangStr += `     | TOTAL      | ${fmtTotNot} | ${fmtTotSeb} | ${fmtTotBel} | ${fmtTotPit} |\n`;
            rekapBonPiutangStr += '     +------------+----------+------------+-----------+------------------+';
         }

         // ============================================
         // 3. MARKETING CALCULATIONS
         // ============================================
         // A. Jumlah Pelanggan Piutang
         const uniqueCustomersWithPiutang = new Set();
         filteredBons.forEach(b => {
            const hist = (b.historiBayar || []).filter(h => !h.isVoid);
            const paid = hist.reduce((s, h) => s + Number(h.nominal || 0), 0);
            const pot = hist.reduce((s, h) => s + Number(h.totalPotongan || 0), 0);
            const sisa = Number(b.total) - pot - paid;
            
            if (sisa > 0.01 && b.konsumen) {
               uniqueCustomersWithPiutang.add(b.konsumen.trim());
            }
         });

         // B. Target Penjualan (Harian >= 10 Ton)
         const dailyWeightMap = {};
         
         // Initialize all calendar dates inside selected period to 0
         let dateIter = parseYMD(fromDate);
         const dateStop = parseYMD(toDate);
         dateIter.setHours(0,0,0,0);
         dateStop.setHours(23,59,59,999);
         
         while(dateIter <= dateStop) {
            dailyWeightMap[toLocalYMD(dateIter)] = 0;
            dateIter.setDate(dateIter.getDate() + 1);
         }

         filteredBons.forEach(b => {
            (b.items || []).forEach(it => {
               if(dailyWeightMap[b.tanggal] !== undefined) {
                  dailyWeightMap[b.tanggal] += Number(it.netto || 0);
               }
            });
         });

         let targetMetDays = 0;
         let targetUnmetDays = 0;
         const totalPeriodDays = Object.keys(dailyWeightMap).length;

         Object.keys(dailyWeightMap).forEach(d => {
            if (dailyWeightMap[d] >= 10000) {
               targetMetDays++;
            } else {
               targetUnmetDays++;
            }
         });

         // C. Retensi Pelanggan (Omzet RFM)
         const customerRFMMap = {};
         const customerMarketingMap = {};
         filteredBons.forEach(b => {
            const k = b.konsumen || 'TANPA NAMA';
            if(!customerRFMMap[k]) {
               customerRFMMap[k] = { name: k, totalBelanja: 0, lastDate: b.tanggal, count: 0 };
            }
            customerRFMMap[k].count++;
            customerRFMMap[k].totalBelanja += Number(b.total);
            if(b.tanggal > customerRFMMap[k].lastDate) customerRFMMap[k].lastDate = b.tanggal;

            const mName = (b.marketing || b.staf || 'TANPA MARKETING').toUpperCase().trim();
            if (!customerMarketingMap[k]) {
               customerMarketingMap[k] = mName;
            }
         });

         const endPeriodObj = new Date(toDate);
         let valTop = 0, valMid = 0, valLow = 0;

         Object.values(customerRFMMap).forEach(c => {
            const lastTransObj = new Date(c.lastDate);
            const diffTime = Math.abs(endPeriodObj - lastTransObj);
            const recencyDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            const rfm = calculateRFMScore(recencyDays, c.count, c.totalBelanja);
            if(rfm.segment === 'Top Customer') valTop += c.totalBelanja;
            else if(rfm.segment === 'Middle Customer') valMid += c.totalBelanja;
            else valLow += c.totalBelanja;
         });

         const topPct = totalJual > 0 ? (valTop / totalJual * 100).toFixed(0) : 0;
         const midPct = totalJual > 0 ? (valMid / totalJual * 100).toFixed(0) : 0;
         const lowPct = totalJual > 0 ? (valLow / totalJual * 100).toFixed(0) : 0;

         // D. Pertumbuhan Pelanggan (Bulan Ini vs Bulan Lalu)
         const startLastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
         const endLastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
         const fromLastMonthYMD = toLocalYMD(startLastMonth);
         const toLastMonthYMD = toLocalYMD(endLastMonth);

         const startThisMonth = new Date(now.getFullYear(), now.getMonth(), 1);
         const endThisMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
         const fromThisMonthYMD = toLocalYMD(startThisMonth);
         const toThisMonthYMD = toLocalYMD(endThisMonth);

         const consumersThisMonth = new Set();
         const consumersLastMonth = new Set();

         bons.filter(b => !b.isVoid).forEach(b => {
            if (b.tanggal >= fromThisMonthYMD && b.tanggal <= toThisMonthYMD && b.konsumen) {
               consumersThisMonth.add(b.konsumen.trim());
            }
            if (b.tanggal >= fromLastMonthYMD && b.tanggal <= toLastMonthYMD && b.konsumen) {
               consumersLastMonth.add(b.konsumen.trim());
            }
         });

         const thisMonthCount = consumersThisMonth.size;
         const lastMonthCount = consumersLastMonth.size;
         const growthVal = thisMonthCount - lastMonthCount;
         const growthPct = lastMonthCount > 0 ? (growthVal / lastMonthCount * 100).toFixed(0) : 0;
         const growthSymbol = growthVal >= 0 ? '+' : '';

         // E. Pelanggan Churn
         const churnCustomers = [];
         consumersLastMonth.forEach(cName => {
            if (!consumersThisMonth.has(cName)) {
               churnCustomers.push(cName);
            }
         });
         const churnListStr = churnCustomers.length > 0 ? churnCustomers.map((x, i) => `     ${i + 1}. ${x}`).join('\n') : '     - Tidak ada';

         // F. Rekap Piutang Berdasarkan Marketing (Point 4)
         const mktPiutangMap = {};
         filteredBons.forEach(b => {
            const hist = (b.historiBayar || []).filter(h => !h.isVoid);
            const paid = hist.reduce((s, h) => s + Number(h.nominal || 0), 0);
            const pot = hist.reduce((s, h) => s + Number(h.totalPotongan || 0), 0);
            const sisa = Number(b.total) - pot - paid;
            
            if (sisa > 0.01) {
               const mName = (b.marketing || b.staf || 'TANPA MARKETING').toUpperCase().trim();
               if (!mktPiutangMap[mName]) {
                  mktPiutangMap[mName] = { piutang: 0, customers: new Set() };
               }
               mktPiutangMap[mName].piutang += sisa;
               if (b.konsumen) {
                  mktPiutangMap[mName].customers.add(b.konsumen.trim());
               }
            }
         });

         let rekapPiutangMarketingStr = "";
         const mktSortedKeys = Object.keys(mktPiutangMap).sort((a,b) => mktPiutangMap[b].piutang - mktPiutangMap[a].piutang);
         
         if (mktSortedKeys.length === 0) {
            rekapPiutangMarketingStr = "     - Tidak ada piutang berjalan pada periode ini.";
         } else {
            mktSortedKeys.forEach((mName, idx) => {
               const item = mktPiutangMap[mName];
               let displayAmt = "";
               if (item.piutang >= 1000000) {
                  const jutaVal = item.piutang / 1000000;
                  const formattedJuta = jutaVal % 1 === 0 ? jutaVal.toFixed(0) : jutaVal.toFixed(1);
                  displayAmt = `${formattedJuta} juta (${formatRp(item.piutang)})`;
               } else {
                  displayAmt = formatRp(item.piutang);
               }
               rekapPiutangMarketingStr += `     ${idx + 1}. ${mName} Jumlah Piutang ${displayAmt} (${item.customers.size} customer)\n`;
            });
            rekapPiutangMarketingStr = rekapPiutangMarketingStr.trimEnd();
         }

         // G. Porsi Pelanggan (RFM) Terhadap Marketing (Point 5)
         const mktRFMMap = {};
         Object.values(customerRFMMap).forEach(c => {
            const lastTransObj = new Date(c.lastDate);
            const diffTime = Math.abs(endPeriodObj - lastTransObj);
            const recencyDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const rfm = calculateRFMScore(recencyDays, c.count, c.totalBelanja);
            
            const mName = customerMarketingMap[c.name] || 'TANPA MARKETING';
            if (!mktRFMMap[mName]) {
               mktRFMMap[mName] = { top: 0, mid: 0, low: 0 };
            }
            if (rfm.segment === 'Top Customer') {
               mktRFMMap[mName].top++;
            } else if (rfm.segment === 'Middle Customer') {
               mktRFMMap[mName].mid++;
            } else {
               mktRFMMap[mName].low++;
            }
         });

         let porsiRfmMarketingStr = "";
         const mktRFMSortedKeys = Object.keys(mktRFMMap).sort((a, b) => {
            const totalA = mktRFMMap[a].top + mktRFMMap[a].mid + mktRFMMap[a].low;
            const totalB = mktRFMMap[b].top + mktRFMMap[b].mid + mktRFMMap[b].low;
            return totalB - totalA;
         });

         if (mktRFMSortedKeys.length === 0) {
            porsiRfmMarketingStr = "     - Tidak ada data porsi pelanggan marketing pada periode ini.";
         } else {
            mktRFMSortedKeys.forEach(mName => {
               const item = mktRFMMap[mName];
               porsiRfmMarketingStr += `     ${mName}\n`;
               porsiRfmMarketingStr += `      • Top Customer (Loyal) : ${item.top} orang\n`;
               porsiRfmMarketingStr += `      • Middle Customer      : ${item.mid} orang\n`;
               porsiRfmMarketingStr += `      • Low Customer         : ${item.low} orang\n`;
            });
            porsiRfmMarketingStr = porsiRfmMarketingStr.trimEnd();
         }

         // ============================================
         // 4. WRITE COMPILED PURE TEXT REPORT
         // ============================================
         const textBlock = document.getElementById('audit-text-block');
         
         const reportText = `
AUDIT SISTEM CV.GLOBAL PUTRA SWASEMBADA
================================================================================
Periode Audit : ${headerPeriodText}
Status Bon    : Khusus Penjualan Non VOID (Lunas & Piutang)
================================================================================

1. OPERASIONAL
--------------------------------------------------------------------------------
- Total Penjualan   = ${formatRp(totalJual)}
- Total Ekor        = ${totalEkor.toLocaleString('id-ID')} Ekor
- Total Kg          = ${totalKg.toLocaleString('id-ID', {minimumFractionDigits: 1})} Kg
- Jumlah Bon        = ${jumlahBon} Bon (rata-rata per hari: ${rataBonPerHari} bon)
- Matrix Ayam Geser = ${matrixGeserPctVal}% dari total pesanan harian
- Quota Ayam :

${tableAText}

${tableBText}


2. KEUANGAN
--------------------------------------------------------------------------------
- Pembayaran Diterima = ${formatRp(totalPenerimaan)} (${terimaPct}% dari Total Penjualan)
- Total Piutang       = ${formatRp(totalPiutang)} (${piutangPct}% dari Total Penjualan)

  Rekap Bon Piutang:
${rekapBonPiutangStr}


3. MARKETING
--------------------------------------------------------------------------------
- Jumlah Total Potongan (Kg) = ${formatKg(totalPotonganKg)} (${potonganKgPct}% dari Total Kg)
- Jumlah Total Potongan (Rp) = ${formatRp(totalPotonganRp)} (${potonganRpPct}% dari Total Penjualan)
- Jumlah Pelanggan Piutang = ${uniqueCustomersWithPiutang.size} pelanggan
- Target Penjualan         = Dari ${totalPeriodDays} hari aktif:
                             • Terpenuhi (>=10 Ton) : ${targetMetDays} hari
                             • Tidak Terpenuhi      : ${targetUnmetDays} hari
- Retensi Pelanggan (RFM)  = Kontribusi omzet masing-masing segmen pelanggan:
                             • Top Customer (Loyal) : ${topPct}%
                             • Middle Customer      : ${midPct}%
                             • Low Customer         : ${lowPct}%
- Pertumbuhan Pelanggan    = Selisih konsumen aktif bulan lalu vs bulan ini:
                             • Bulan Ini            : ${thisMonthCount} pelanggan
                             • Bulan Lalu           : ${lastMonthCount} pelanggan
                             • Hasil Pertumbuhan    : ${growthSymbol}${growthVal} pelanggan (${growthSymbol}${growthPct}%)
- Pelanggan bulan lalu yg tidak belanja bulan ini (Churn):
${churnListStr}


4. REKAP PIUTANG BERDASARKAN MARKETING
--------------------------------------------------------------------------------
${rekapPiutangMarketingStr}


5. PORSI PELANGGAN (RFM) TERHADAP MARKETING
--------------------------------------------------------------------------------
${porsiRfmMarketingStr}

================================================================================
Laporan dibuat otomatis oleh sistem Tata Global - Tanggal cetak: ${new Date().toLocaleDateString('id-ID', {weekday: 'long', day:'2-digit', month:'long', year:'numeric', timeZone: 'Asia/Jakarta'})}
`.trim();

         textBlock.textContent = reportText;
      }

      // Copy to Clipboard
      function copyAuditText() {
        const text = document.getElementById('audit-text-block').textContent;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('copy-btn-txt');
          btn.textContent = '✅ Berhasil Disalin!';
          setTimeout(() => {
            btn.textContent = '📋 Salin Teks';
          }, 2000);
        });
      }

      // EXCEL EXPORTER
      function exportToExcel() {
        const rangeMode = document.getElementById('filter-range').value;
        const textContent = document.getElementById('audit-text-block').textContent;
        const rows = textContent.split('\n').map(line => [line]);
        
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, "Audit & KPI Report");
        XLSX.writeFile(wb, `Laporan_Audit_KPI_${rangeMode}.xlsx`);
        
        if (typeof ActivityLogger !== 'undefined') {
          ActivityLogger.log({ action: 'DOWNLOAD', entityType: 'REPORT', entityId: 'AUDIT-KPI', message: 'Ekspor Excel Laporan Audit & KPI' });
        }
      }

      // Event Listeners
      document.getElementById('filter-range').addEventListener('change', (e) => {
         document.getElementById('custom-date-inputs').classList.toggle('hidden', e.target.value !== 'custom');
      });

      document.getElementById('apply-filter').addEventListener('click', calculateAuditKPI);
      document.getElementById('btn-export').addEventListener('click', exportToExcel);
      document.getElementById('btn-print').addEventListener('click', () => {
         window.print();
      });

      window.addEventListener('DOMContentLoaded', async () => {
         // Default inputs
         const now = new Date();
         const first = toLocalYMD(new Date(now.getFullYear(), now.getMonth(), 1));
         const last = toLocalYMD(now);
         document.getElementById('start-date').value = first;
         document.getElementById('end-date').value = last;
         
         // Wait for data layer init
         if (window.DataLayer) {
           await window.DataLayer.init();
           globalBons = window.DataLayer.getBons();
           globalMasterKonsumen = window.DataLayer.getMaster('konsumen');
         }
         
         // Update sidebar permissions & user labels
         if (typeof AuthGuard !== 'undefined') {
            const user = AuthGuard.getCurrentUser();
            if (user) {
               document.getElementById('sidebar-user-name').textContent = user.name || '-';
               document.getElementById('sidebar-user-email').textContent = user.email || user.role || '-';
               document.getElementById('header-role-badge').textContent = 'Role: ' + (user.role || '-');
               document.getElementById('header-user-avatar').textContent = (user.name || '-').charAt(0).toUpperCase();
            }
         }
         
         // Run main audit calculations
         calculateAuditKPI();
      });
    </script>
  </body>
